<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>录屏工具 - Efficiency Toolkit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 { font-size: 20px; margin-bottom: 4px; }
    .header p { font-size: 13px; opacity: 0.9; }
    
    .status-bar {
      background: white;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border-bottom: 1px solid #eee;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ccc;
    }
    .status-dot.recording {
      background: #e74c3c;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .status-text { font-size: 14px; color: #666; }
    
    .preview {
      background: #1a1a1a;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview video {
      max-width: 100%;
      max-height: 100%;
    }
    .preview .placeholder {
      color: #666;
      font-size: 14px;
    }
    
    .controls {
      padding: 20px;
      background: white;
    }
    .record-type {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .type-btn {
      flex: 1;
      padding: 12px;
      border: 2px solid #ddd;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      text-align: center;
    }
    .type-btn:hover { border-color: #667eea; }
    .type-btn.active {
      border-color: #667eea;
      background: #f5f3ff;
      color: #667eea;
    }
    .type-btn .icon { font-size: 24px; display: block; margin-bottom: 4px; }
    
    .action-btns {
      display: flex;
      gap: 12px;
    }
    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .start-btn {
      background: #e74c3c;
      color: white;
    }
    .start-btn:hover:not(:disabled) { background: #c0392b; }
    .start-btn.recording {
      background: #27ae60;
    }
    
    .stop-btn {
      background: #95a5a6;
      color: white;
    }
    .stop-btn:hover:not(:disabled) { background: #7f8c8d; }
    
    .share-btn {
      background: #667eea;
      color: white;
    }
    .share-btn:hover:not(:disabled) { background: #5568d3; }
    
    .timer {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #333;
      margin: 16px 0;
      font-family: monospace;
    }
    
    .settings {
      padding: 0 20px 20px;
      background: white;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 13px; color: #666; }
    .setting-value {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    select, input[type="number"] {
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
    }
    
    .tips {
      margin: 16px;
      padding: 12px;
      background: #fff3cd;
      border-radius: 8px;
      font-size: 12px;
      color: #856404;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎬 录屏工具</h1>
    <p>快速录制屏幕，一键分享</p>
  </div>
  
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">准备就绪</div>
  </div>
  
  <div class="preview" id="preview">
    <div class="placeholder">点击开始录制</div>
  </div>
  
  <div class="timer" id="timer">00:00:00</div>
  
  <div class="controls">
    <div class="record-type">
      <div class="type-btn active" data-type="screen">
        <span class="icon">🖥️</span>
        全屏录制
      </div>
      <div class="type-btn" data-type="window">
        <span class="icon">📑</span>
        窗口录制
      </div>
      <div class="type-btn" data-type="area">
        <span class="icon">⬜</span>
        区域录制
      </div>
    </div>
    
    <div class="action-btns">
      <button class="btn start-btn" id="startBtn">🔴 开始录制</button>
      <button class="btn stop-btn" id="stopBtn" disabled>⏹️ 停止</button>
      <button class="btn share-btn" id="shareBtn" disabled>📤 分享</button>
    </div>
  </div>
  
  <div class="settings">
    <div class="setting-row">
      <span class="setting-label">视频质量</span>
      <select id="quality">
        <option value="high">高清 (1080p)</option>
        <option value="medium">标清 (720p)</option>
        <option value="low">流畅 (480p)</option>
      </select>
    </div>
    <div class="setting-row">
      <span class="setting-label">录制声音</span>
      <select id="audio">
        <option value="none">无</option>
        <option value="system">系统声音</option>
        <option value="microphone">麦克风</option>
        <option value="both" selected>系统+麦克风</option>
      </select>
    </div>
    <div class="setting-row">
      <span class="setting-label">最大时长 (分钟)</span>
      <input type="number" id="maxDuration" value="30" min="1" max="60" style="width:80px;">
    </div>
  </div>
  
  <div class="tips">
    💡 提示：首次使用需要授权屏幕录制权限
  </div>
  
  <script src="record.js"></script>
</body>
</html>
