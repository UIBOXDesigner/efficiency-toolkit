<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>格式转换 - Efficiency Toolkit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 450px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
    }
    .header h1 { font-size: 18px; }
    .converter { padding: 16px; }
    .type-select {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .type-btn {
      padding: 8px 16px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .type-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }
    .type-btn:hover:not(.active) { border-color: #667eea; }
    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      resize: none;
      font-family: 'Monaco', 'Menlo', monospace;
    }
    textarea:focus { outline: none; border-color: #667eea; }
    .actions {
      display: flex;
      gap: 8px;
      margin: 12px 0;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .convert { background: #667eea; color: white; }
    .convert:hover { background: #5568d3; }
    .copy { background: #00b894; color: white; }
    .copy:hover { background: #00a383; }
    .clear { background: #e0e0e0; color: #333; }
    .result {
      background: white;
      padding: 12px;
      border-radius: 8px;
      min-height: 80px;
      font-size: 13px;
      font-family: 'Monaco', 'Menlo', monospace;
      word-break: break-all;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔄 格式转换</h1>
  </div>
  
  <div class="converter">
    <div class="type-select">
      <button class="type-btn active" data-type="json">JSON 格式化</button>
      <button class="type-btn" data-type="base64">Base64 编解码</button>
      <button class="type-btn" data-type="timestamp">时间戳</button>
      <button class="type-btn" data-type="url">URL 编解码</button>
      <button class="type-btn" data-type="md5">MD5 加密</button>
    </div>
    
    <textarea id="input" placeholder="输入内容..."></textarea>
    
    <div class="actions">
      <button class="convert" id="convertBtn">转换</button>
      <button class="copy" id="copyBtn">复制结果</button>
      <button class="clear" id="clearBtn">清空</button>
    </div>
    
    <div class="result" id="result">结果将显示在这里</div>
  </div>
  
  <script src="converter.js"></script>
</body>
</html>
